<svg viewBox="0 0 420 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&amp;family=Noto+Serif+JP:wght@900&amp;family=Inter:wght@800;900&amp;display=swap');
      .red-text {
        fill: #D2232A;
        font-family: 'Cinzel', 'Playfair Display', 'Georgia', serif;
        font-weight: 900;
        letter-spacing: -5px;
      }
      .kanji-text {
        fill: #2D2D2D;
        font-family: 'Noto Serif JP', 'MS Mincho', 'Hiragino Mincho Pro', serif;
        font-weight: 900;
      }
      .brand-title {
        fill: #2D2D2D;
        font-family: 'Inter', 'Helvetica Neue', sans-serif;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: -1px;
      }
      .brand-subtitle {
        fill: #D2232A;
        font-family: 'Inter', 'Helvetica Neue', sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.3em;
      }
    </style>
  </defs>

  <!-- Letter R -->
  <text x="40" y="200" class="red-text" font-size="170">R</text>

  <!-- Japanese Kanji "連" -->
  <text x="195" y="185" class="kanji-text" font-size="115">連</text>

  <!-- E-bar red brush stroke overlapping the Kanji -->
  <path d="M 185 142 L 315 142" stroke="#D2232A" stroke-width="15" stroke-linecap="round"/>

  <!-- Letter N -->
  <text x="305" y="200" class="red-text" font-size="170">N</text>

  <!-- Brand Text below -->
  <!-- "Rede Nikkei" -->
  <text x="210" y="280" class="brand-title" font-size="34" text-anchor="middle">REDE NIKKEI</text>

  <!-- "Brasil" -->
  <text x="215" y="325" class="brand-subtitle" font-size="28" text-anchor="middle">BRASIL</text>
</svg>
